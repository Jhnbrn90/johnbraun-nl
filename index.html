<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Braun</title>
  <meta name="description" content="John Braun" />
  <style>
    :root {
      --bg: #0a0d14;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-strong: rgba(255, 255, 255, 0.07);
      --text: #f5f7fb;
      --muted: #9aa4b5;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #8cc9ff;
      --max: 920px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(140, 201, 255, 0.08), transparent 28%), #0a0d14;
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 48px 0;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .name {
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      margin: 0 0 18px;
      font-weight: 700;
    }

    .intro {
      max-width: 44rem;
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.02rem;
    }

    .intro strong {
      color: var(--text);
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 34px;
      padding: 0;
      list-style: none;
    }

    .tags li {
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .grid {
      display: grid;
      grid-template-columns: auto;
      gap: 14px;
      margin-bottom: 28px;
    }

    .tile {
      display: block;
      padding: 22px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .tile:hover {
      transform: translateY(-2px);
      border-color: rgba(140, 201, 255, 0.35);
      background: var(--surface-strong);
    }

    .label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .tile h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      letter-spacing: -0.03em;
    }

    .tile p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.97rem;
    }

    @media (max-width: 720px) {
      .wrap {
        align-items: flex-start;
        padding: 24px 0;
      }

      .card {
        padding: 26px;
        border-radius: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="container">
      <section class="card" aria-label="Introduction">
        <h1 class="name">John Braun</h1>
        <ul class="tags" aria-label="Expertise">
          <li>Python</li>
          <li>Data Science</li>
          <li>Machine Learning</li>
          <li>AI</li>
          <li>Organic Chemistry</li>
        </ul>

        <div class="grid">
          <a class="tile" href="https://pubs.acs.org/doi/10.1021/acs.orglett.8b02232" target="_blank" rel="noreferrer">
            <span class="label">Organic Letters</span>
            <p>
              Stereoselective Synthesis of Fused Vinylcyclopropanes by Intramolecular Tsuji–Trost Cascade Cyclization
            </p>
          </a>

        </div>
      </section>
    </div>
  </main>
</body>
</html>
